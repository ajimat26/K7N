<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>K7N STORE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
.header{background:#ee4d2d;color:white;padding:15px;font-size:20px;}
.container{display:flex;flex-direction:column;height:100vh;}
.content{flex:1;padding:20px;overflow:auto;}

.menu-bottom{
background:white;
padding:10px;
border-top:2px solid #eee;
display:flex;
gap:10px;
}

.menu-btn{
flex:1;
text-align:center;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#fff;
}
.menu-btn:hover{
border-color:#ee4d2d;
background:#fff3f0;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
border:1px solid #eee;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
background:#ee4d2d;
color:white;
border:none;
border-radius:8px;
margin-top:5px;
}

.struk{
background:#fff;
padding:15px;
margin-top:10px;
font-family:monospace;
border-radius:10px;
color:black;
}

.line{
border-bottom:1px dashed #aaa;
margin:8px 0;
}

.status{
padding:3px 6px;
border-radius:5px;
color:white;
font-size:12px;
}
.sukses{background:green}
.pending{background:orange}
.proses{background:blue}
.gagal{background:red}

.logo{
width:50px;
display:block;
margin:auto;
}
</style>
</head>

<body>

<div class="container">

<div class="header">K7N STORE</div>

<div class="content" id="app"></div>

<div class="menu-bottom">
<div class="menu-btn" onclick="page('buat')">📦 Buat</div>
<div class="menu-btn" onclick="page('riwayat')">📊 Riwayat</div>
<div class="menu-btn" onclick="page('grafik')">📈 Grafik</div>
</div>

</div>

<script>

/* ===== DATABASE ===== */
let db = JSON.parse(localStorage.getItem("k7n")) || [];

/* ===== PRODUK ===== */
const produk = [
{nama:"Follower Indo 100", harga:10500},
{nama:"Follower Global 100", harga:5000},
{nama:"Like TikTok 100", harga:800},
{nama:"Viewer 1000", harga:800}
];

const logo = "https://i.supaimg.com/2c1011f1-f260-4955-af4a-29c7a57d78c9.png";

/* ===== PAGE ===== */
function page(p){

if(p=="buat"){

let opt="";
produk.forEach((x,i)=>{
opt+=`<option value="${i}">${x.nama} - Rp ${x.harga}</option>`;
});

document.getElementById("app").innerHTML=`
<div class="card">
<h3>Buat Struk</h3>

<input id="nama" placeholder="Nama">

<select id="produk" onchange="isiHarga()">
<option value="">-- Pilih Produk --</option>
${opt}
<option value="custom">Custom</option>
</select>

<input id="harga" type="number" placeholder="Harga">

<select id="status">
<option>SUKSES</option>
<option>PENDING</option>
<option>PROSES</option>
<option>GAGAL</option>
</select>

<button onclick="buat()">Buat Struk</button>

<div id="hasil"></div>
</div>
`;
}

if(p=="riwayat"){
let html="";
db.slice().reverse().forEach(x=>{
html+=`
<div class="card">
<b>${x.id}</b><br>
${x.nama}<br>
${x.layanan}<br>
Rp ${Number(x.harga).toLocaleString("id-ID")}<br>
<span class="status ${x.status.toLowerCase()}">${x.status}</span>
</div>`;
});
document.getElementById("app").innerHTML=html;
}

if(p=="grafik"){

let s=0,pd=0,pr=0,g=0,total=0;

db.forEach(x=>{
if(x.status=="SUKSES"){s++; total+=Number(x.harga);}
if(x.status=="PENDING")pd++;
if(x.status=="PROSES")pr++;
if(x.status=="GAGAL")g++;
});

document.getElementById("app").innerHTML=`
<div class="card">
<h3>Grafik</h3>
<canvas id="c"></canvas>
<p>Total: Rp ${total.toLocaleString("id-ID")}</p>
</div>
`;

setTimeout(()=>{
new Chart(document.getElementById("c"),{
type:"bar",
data:{
labels:["SUKSES","PENDING","PROSES","GAGAL"],
datasets:[{data:[s,pd,pr,g]}]
}
});
},100);

}

}

/* ===== AUTO HARGA ===== */
function isiHarga(){
let val=document.getElementById("produk").value;
if(val!=="custom" && val!==""){
document.getElementById("harga").value=produk[val].harga;
}
}

/* ===== BUAT STRUK ===== */
function buat(){

let nama=document.getElementById("nama").value;
let harga=document.getElementById("harga").value;
let status=document.getElementById("status").value;
let p=document.getElementById("produk").value;

if(!nama||!harga)return alert("Isi dulu!");

let namaProduk = (p==="custom"||p==="") ? "Custom" : produk[p].nama;
let id="K7N-"+Math.random().toString(36).substr(2,5);
let tanggal=new Date().toLocaleString("id-ID");

let obj={id,nama,layanan:namaProduk,harga,status,tanggal};
db.push(obj);
localStorage.setItem("k7n",JSON.stringify(db));

/* STRUK */
document.getElementById("hasil").innerHTML=`
<div id="strukBox" class="struk">
<img src="${logo}" class="logo">
<h3 style="text-align:center;">K7N STORE</h3>

<div class="line"></div>

<p>ID: ${id}</p>
<p>Nama: ${nama}</p>
<p>Layanan: ${namaProduk}</p>
<p>Tanggal: ${tanggal}</p>

<div class="line"></div>

<p>Harga: Rp ${Number(harga).toLocaleString("id-ID")}</p>

<div class="line"></div>

<p>Status: <span class="status ${status.toLowerCase()}">${status}</span></p>

<div class="line"></div>

<p style="text-align:center;">Terima kasih 🙏</p>
</div>

<button onclick="download()">📥 Download</button>
<button onclick='wa(${JSON.stringify(obj)})'>📤 WhatsApp</button>
`;
}

/* ===== DOWNLOAD ===== */
function download(){
html2canvas(document.getElementById("strukBox")).then(canvas=>{
let a=document.createElement("a");
a.download="struk_k7n.png";
a.href=canvas.toDataURL();
a.click();
});
}

/* ===== WA ===== */
function wa(x){
let text=`🧾 K7N STORE

ID: ${x.id}
Nama: ${x.nama}
Layanan: ${x.layanan}
Harga: Rp ${x.harga}
Status: ${x.status}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* START */
page("buat");

</script>

</body>
</html>
