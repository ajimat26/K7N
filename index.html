<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K7N STORE STRUK</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: green;
    color: white;
    margin-top: 10px;
}

/* STRUK */
.struk {
    margin-top: 20px;
    width: 300px;
    margin: auto;
    background: #fff;
    color: #000;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
}

/* LOGO */
.logo {
    width: 70px;
    display: block;
    margin: auto;
}

.line {
    border-bottom: 1px dashed #000;
    margin: 10px 0;
}

.status {
    padding: 4px 8px;
    border-radius: 6px;
    color: white;
    font-size: 12px;
}

.sukses { background: green; }
.pending { background: orange; }
.proses { background: blue; }
</style>
</head>

<body>

<h2 style="color:white;">K7N STORE</h2>

<div class="container">

<input type="text" id="nama" placeholder="Nama">

<select id="layanan" onchange="toggleCustom()">
<option value="follower_indonesia">Followers Indonesia</option>
<option value="follower_global">Followers Global</option>
<option value="like">Like TikTok</option>
<option value="viewer">Viewer TikTok</option>
<option value="custom">Custom</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">

<input type="text" id="namaCustom" placeholder="Nama Custom" style="display:none;">
<input type="number" id="hargaCustom" placeholder="Harga Custom" style="display:none;">

<select id="status">
<option value="SUKSES">SUKSES</option>
<option value="PENDING">PENDING</option>
<option value="PROSES">PROSES</option>
</select>

<button onclick="buatStruk()">Buat Struk</button>
<button onclick="downloadStruk()">Download</button>

<div id="hasil" class="struk" style="display:none;"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

// 🔥 LOGO AMAN (PAKAI LINK)
const logo = "https://i.supaimg.com/2c1011f1-f260-4955-af4a-29c7a57d78c9.png";

function toggleCustom() {
    let layanan = document.getElementById("layanan").value;
    document.getElementById("namaCustom").style.display = layanan === "custom" ? "block" : "none";
    document.getElementById("hargaCustom").style.display = layanan === "custom" ? "block" : "none";
}

function buatStruk() {
    let nama = document.getElementById("nama").value;
    let layanan = document.getElementById("layanan").value;
    let jumlah = document.getElementById("jumlah").value;
    let status = document.getElementById("status").value;

    let harga = 0;
    let namaLayanan = "";

    if (layanan === "custom") {
        namaLayanan = document.getElementById("namaCustom").value;
        harga = document.getElementById("hargaCustom").value;
    }
    else if (layanan === "follower_indonesia") {
        namaLayanan = "Followers Indonesia";
        harga = (jumlah / 100) * 5200;
    }
    else if (layanan === "follower_global") {
        namaLayanan = "Followers Global";
        harga = (jumlah / 100) * 5100;
    }
    else if (layanan === "like") {
        namaLayanan = "Like TikTok";
        harga = (jumlah / 100) * 100;
    }
    else if (layanan === "viewer") {
        namaLayanan = "Viewer TikTok";
        harga = (jumlah / 100) * 50;
    }

    let tanggal = new Date().toLocaleString("id-ID");

    document.getElementById("hasil").innerHTML = `
        <img src="${logo}" class="logo" crossorigin="anonymous">

        <h3 style="text-align:center;">K7N STORE</h3>

        <div class="line"></div>

        <p>👤 NAMA: ${nama}</p>
        <p>📦 LAYANAN: ${namaLayanan}</p>
        <p>📅 TANGGAL: ${tanggal}</p>
        <p>🔢 JUMLAH: ${jumlah}</p>

        <div class="line"></div>

        <p>💰 HARGA: Rp ${Number(harga).toLocaleString("id-ID")}</p>

        <div class="line"></div>

        <p>📊 STATUS:
        <span class="status ${status.toLowerCase()}">${status}</span></p>

        ${status === "PROSES" ? `<p>⏳ Diproses ±24 jam</p>` : ""}

        <div class="line"></div>

        <p style="text-align:center;">Terima kasih 🙏</p>
    `;

    document.getElementById("hasil").style.display = "block";
}

// 🔥 FIX ANTI PUTIH KOSONG
function downloadStruk() {
    let struk = document.getElementById("hasil");

    setTimeout(() => {
        html2canvas(struk, {
            useCORS: true,
            backgroundColor: "#ffffff",
            scale: 2
        }).then(canvas => {
            let link = document.createElement("a");
            link.download = "struk_k7n.png";
            link.href = canvas.toDataURL();
            link.click();
        });
    }, 500); // delay biar gambar ke-load dulu
}
</script>

</body>
</html>
