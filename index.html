<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Webhook Embed Sender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    textarea, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    textarea {
      height: 120px;
      resize: none;
    }
    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Discord Embed Webhook Sender</h1><textarea id="message" placeholder="Tulis pesan..."></textarea>
<input type="file" id="file" accept="image/*,video/*" />

<button onclick="sendToDiscord()">Kirim Embed</button>

<div class="status" id="status"></div>

  </div>  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1497852316521599046/n8xMvQKFdTpf8fgoSwxAyJRwgig_PqqTAa1jhp3-vIMNqqenO3TXXwTlNgibC6lrh79v";

    async function sendToDiscord() {
      const message = document.getElementById('message').value;
      const fileInput = document.getElementById('file');
      const status = document.getElementById('status');

      status.innerText = "Mengirim...";

      let payload = {
        content: "",
        embeds: [
          {
            title: "Pesan Baru",
            description: message || "(tanpa pesan)",
            color: 3447003,
            image: {}
          }
        ]
      };

      const formData = new FormData();
      formData.append("payload_json", JSON.stringify(payload));

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        formData.append("file", file);

        // jika image, tampilkan di embed
        if (file.type.startsWith("image/")) {
          payload.embeds[0].image = {
            url: "attachment://" + file.name
          };
          formData.set("payload_json", JSON.stringify(payload));
        }
      }

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          body: formData
        });

        if (res.ok) {
          status.innerText = "Berhasil terkirim sebagai embed!";
          document.getElementById('message').value = "";
          fileInput.value = "";
        } else {
          status.innerText = "Gagal mengirim ke Discord";
        }
      } catch (err) {
        status.innerText = "Error: " + err.message;
      }
    }
  </script></body>
</html>
